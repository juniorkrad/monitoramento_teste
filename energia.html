<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energia - Painel de Monitoramento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=router_off" />
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="energia.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            <div id="energy-olt-grid" class="grid-container">
            </div>
        </main>
    </div>

    <div id="super-modal" class="modal-overlay" onclick="closeSuperModal(event)">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="super-modal-title" style="margin: 0; display: flex; align-items: center; gap: 8px;">
                    <span class="material-symbols-rounded">dns</span> Detalhes da OLT
                </h3>
                <button class="close-modal" onclick="closeSuperModal()">&times;</button>
            </div>
            <div class="modal-body">
                
                <div id="energy-view-placas">
                    <div id="energy-placas-list" class="placas-grid"></div>
                </div>

                <div id="energy-view-detalhes" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                        <button class="btn-voltar-placas" style="margin-bottom: 0;" onclick="backToEnergyPlacas()">
                            <span class="material-symbols-rounded">arrow_back</span> Voltar para Placas
                        </button>
                        <button class="btn-voltar-placas" style="margin-bottom: 0; padding: 10px;" onclick="exportEnergiaPlacaToTXT()" title="Exportar para TXT">
                            <span class="material-symbols-rounded">download</span>
                        </button>
                    </div>
                    
                    <div class="table-container">
                        <table class="noc-table">
                            <thead>
                                <tr class="table-header-row">
                                    <th>PORTAS</th>
                                    <th>CIRCUITOS</th>
                                    <th>BAIRROS</th>
                                    <th>STATUS</th>
                                </tr>
                            </thead>
                            <tbody id="energy-detalhes-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="config.js"></script>
    <script src="api-service.js"></script>
    <script src="data-mapper.js"></script>
    <script src="data-store.js"></script>
    <script src="layout.js"></script>
    <script src="notifications.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="energia-engine.js"></script> 
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registrado com sucesso!'))
                .catch(err => console.error('Erro ao registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
