<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energia - Painel de Monitoramento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="energia.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div id="toast-container"></div>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            
            <div id="energy-olt-grid" class="grid-container">
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                    <div class="spinner"></div>
                    <p style="color: var(--m3-on-surface-variant);">Processando alarmes de Dying Gasp...</p>
                </div>
            </div>

        </main>
    </div>

    <div id="footer-placeholder"></div>

    <div id="energy-detail-modal" class="modal-overlay" onclick="closeEnergyModal(event)">
        <div class="modal-content modal-large">
            
            <div class="modal-header">
                <div>
                    <h3 id="energy-modal-title" style="margin: 0; display: flex; align-items: center; gap: 8px;">
                        <span class="material-symbols-rounded">dns</span> OLT Selecionada
                    </h3>
                    <p id="energy-modal-last-update" style="margin: 5px 0 0 0; font-size: 0.85rem; color: var(--m3-on-surface); font-family: var(--font-family-mono); display: flex; align-items: center; gap: 5px;">
                        <span class="material-symbols-rounded" style="font-size: 14px;">calendar_today</span> <span id="energy-update-date">--/--/----</span>
                        <span style="color: rgba(255,255,255,0.3); margin: 0 4px;">|</span>
                        <span class="material-symbols-rounded" style="font-size: 14px;">schedule</span> <span id="energy-update-time">--:--:--</span>
                    </p>
                </div>
                <button class="close-modal" onclick="closeEnergyModal()" title="Fechar">&times;</button>
            </div>
            
            <div class="modal-body">
                
                <div id="energy-view-placas">
                    <p style="margin-bottom: 15px; color: var(--m3-on-surface-variant);">Selecione uma placa para ver os detalhes das portas:</p>
                    <div id="energy-placas-list" class="placas-grid">
                    </div>
                </div>

                <div id="energy-view-detalhes" style="display: none;">
                    <button class="btn-voltar-placas" onclick="backToEnergyPlacas()">
                        <span class="material-symbols-rounded">arrow_back</span> Voltar para Placas
                    </button>
                    
                    <h4 id="energy-placa-subtitle" style="margin-bottom: 15px; color: var(--m3-on-surface); font-size: 1.1rem;">Detalhes - Placa X</h4>
                    
                    <div class="table-container" style="max-height: 400px; overflow-y: auto;">
                        <table class="olt-table">
                            <thead>
                                <tr>
                                    <th>Porta</th>
                                    <th>Circuito (Bairro)</th>
                                    <th>Total Clientes</th>
                                    <th style="color: #f87171;">Power Off</th>
                                    <th>Impacto</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="energy-detalhes-tbody">
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script src="notifications.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="energia-engine.js"></script> 

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader({ title: "Alarmes de Energia", exactTitle: true });
            loadFooter();

            // Injeta a data/hora logo após o cabeçalho ser criado
            setPageOpenTime();
        });

        // Função formatada com o padrão visual do layout.js (com segundos)
        function setPageOpenTime() {
            let timestampEl = document.getElementById('update-timestamp');
            
            if (timestampEl) {
                const now = new Date();
                const dataFormatada = now.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const horaFormatada = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                
                timestampEl.innerHTML = `
                    <span class="material-symbols-rounded">calendar_today</span> ${dataFormatada}
                    <span style="display: inline-block; width: 1px; height: 12px; background: rgba(255,255,255,0.3); margin: 0 5px;"></span>
                    <span class="material-symbols-rounded">schedule</span> ${horaFormatada}
                `;
                timestampEl.style.color = 'var(--m3-on-surface-variant)';
            }
        }

        function closeEnergyModal(event) {
            if (event && event.target.id !== 'energy-detail-modal' && !event.target.classList.contains('close-modal')) return;
            document.getElementById('energy-detail-modal').style.display = 'none';
        }

        function backToEnergyPlacas() {
            document.getElementById('energy-view-detalhes').style.display = 'none';
            document.getElementById('energy-view-placas').style.display = 'block';
        }
    </script>
</body>
</html>
