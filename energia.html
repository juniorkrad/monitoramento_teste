<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energia - Painel de Monitoramento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* Estilos específicos para a página de Energia para garantir o visual MD3 */
        .energy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-container-card {
            background: var(--m3-surface-container);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--m3-outline-variant);
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .table-card {
            background: var(--m3-surface-container);
            border-radius: 24px;
            border: 1px solid var(--m3-outline-variant);
            overflow: hidden;
        }

        .card-header-simple {
            padding: 16px 24px;
            background: rgba(234, 208, 255, 0.1);
            border-bottom: 1px solid var(--m3-outline-variant);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-header-simple h3 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--m3-on-surface);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .impact-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .impact-high { background: rgba(248, 113, 113, 0.2); color: #f87171; }
        .impact-med { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .impact-low { background: rgba(74, 222, 128, 0.2); color: #4ade80; }

        .loading-overlay {
            padding: 40px;
            text-align: center;
            color: var(--m3-on-surface-variant);
        }

        /* Spinner MD3 */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--m3-surface-container-high);
            border-top: 4px solid var(--m3-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            
            <div class="energy-grid">
                <div class="overview-card" style="border-left: 5px solid #f87171;">
                    <div class="card-body" style="padding: 24px; flex-direction: row; justify-content: space-between; align-items: center;">
                        <div>
                            <span style="color: var(--m3-on-surface-variant); font-size: 0.9rem; font-weight: 500;">CLIENTES SEM ENERGIA</span>
                            <h2 id="card-total-quedas" style="font-size: 2.5rem; margin: 5px 0; color: #f87171;">0</h2>
                        </div>
                        <span class="material-symbols-rounded" style="font-size: 48px; color: #f87171; opacity: 0.5;">bolt</span>
                    </div>
                </div>

                <div class="overview-card" style="border-left: 5px solid #fbbf24;">
                    <div class="card-body" style="padding: 24px; flex-direction: row; justify-content: space-between; align-items: center;">
                        <div>
                            <span style="color: var(--m3-on-surface-variant); font-size: 0.9rem; font-weight: 500;">PORTAS AFETADAS</span>
                            <h2 id="card-portas-afetadas" style="font-size: 2.5rem; margin: 5px 0; color: #fbbf24;">0</h2>
                        </div>
                        <span class="material-symbols-rounded" style="font-size: 48px; color: #fbbf24; opacity: 0.5;">router</span>
                    </div>
                </div>

                <div class="overview-card" style="border-left: 5px solid var(--m3-primary);">
                    <div class="card-body" style="padding: 24px; flex-direction: row; justify-content: space-between; align-items: center;">
                        <div>
                            <span style="color: var(--m3-on-surface-variant); font-size: 0.9rem; font-weight: 500;">ÚLTIMA VARREDURA</span>
                            <h2 id="card-last-update" style="font-size: 1.2rem; margin: 15px 0; color: var(--m3-on-surface); font-family: 'Roboto Mono';">--/-- --:--</h2>
                        </div>
                        <span class="material-symbols-rounded" style="font-size: 48px; color: var(--m3-primary); opacity: 0.5;">history</span>
                    </div>
                </div>
            </div>

            <div class="chart-container-card" style="margin-bottom: 20px;">
                <div class="card-header-simple" style="background: transparent; border: none; padding-left: 0;">
                    <h3><span class="material-symbols-rounded">bar_chart</span> Ranking de Portas Críticas</h3>
                </div>
                <div style="flex: 1; position: relative; width: 100%;">
                    <canvas id="energyChart"></canvas>
                </div>
            </div>

            <div class="table-card">
                <div class="card-header-simple">
                    <h3><span class="material-symbols-rounded">list_alt</span> Detalhamento Dying Gasp</h3>
                </div>
                <div class="table-container" style="max-height: 500px; overflow-y: auto;">
                    <table class="olt-table">
                        <thead>
                            <tr>
                                <th>OLT</th>
                                <th>Porta</th>
                                <th>Circuito (Bairro)</th>
                                <th>Total Clientes</th>
                                <th style="color: #f87171;">Power Off</th>
                                <th>Impacto</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="energy-table-body">
                            <tr>
                                <td colspan="7">
                                    <div class="loading-overlay">
                                        <div class="spinner"></div>
                                        Sincronizando com as OLTs...
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="layout.js"></script>
    <script src="notifications.js"></script>
    <script src="olt-engine.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        // Configuração do Header através do layout.js
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader({ 
                title: "Alarmes de Energia", 
                exactTitle: true 
            });
            loadFooter();

            // Inicia o motor de energia do olt-engine.js
            if (typeof startEnergyMonitoring === 'function') {
                startEnergyMonitoring();
            }
        });
    </script>
</body>
</html>
