<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEL-1 | Monitoramento</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div id="sidebar-placeholder"></div>

    <div id="toast-container"></div>

    <div class="page-container main-content">
        
        <div id="header-placeholder"></div>

        <div class="grid-container">
            
        </div>

        <div id="footer-placeholder"></div>
    </div>
    
    <script src="layout.js"></script>       
    <script src="notifications.js"></script> 
    <script src="olt-engine.js"></script> 

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Carrega o Menu Lateral (NOVO)
            loadSidebar();

            // 2. Carrega o Cabeçalho (Sem botão Home, pois o menu já tem)
            loadHeader({
                title: "HEL-1 - Nokia"
            });

            // 3. Carrega Rodapé
            loadFooter();

            // 4. Inicia o Monitoramento
            startOltMonitoring({
                id: 'HEL1',     // Nome da aba na planilha
                type: 'nokia',  // Lógica Nokia
                boards: 8       // 8 Placas
            });
        });
    </script>
</body>
</html>
