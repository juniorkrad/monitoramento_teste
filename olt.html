<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status das OLTs - Monitoramento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="olt.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            <div id="overview-grid" class="grid-container">
                </div>
        </main>
    </div>

    <div id="super-modal" class="modal-overlay" onclick="closeSuperModal(event)">
        <div class="modal-content modal-large">
            
            <div class="modal-header">
                <div>
                    <h3 id="super-modal-title" style="margin: 0; display: flex; align-items: center; gap: 8px;">
                        <span class="material-symbols-rounded">dns</span> Detalhes da OLT
                    </h3>
                    <p id="olt-modal-last-update" style="margin: 5px 0 0 0; font-size: 0.85rem; color: var(--m3-on-surface); font-family: var(--font-family-mono); display: flex; align-items: center; gap: 5px;">
                        <span class="material-symbols-rounded" style="font-size: 14px;">calendar_today</span> <span id="olt-update-date">--/--/----</span>
                        <span style="color: rgba(255,255,255,0.3); margin: 0 4px;">|</span>
                        <span class="material-symbols-rounded" style="font-size: 14px;">schedule</span> <span id="olt-update-time">--:--:--</span>
                    </p>
                </div>
                <button class="close-modal" onclick="closeSuperModal()" title="Fechar">&times;</button>
            </div>

            <div class="modal-body">
                
                <div id="olt-view-placas">
                    <p>Selecione uma placa para ver os detalhes das portas:</p>
                    <div id="olt-placas-list" class="placas-grid">
                        </div>
                </div>

                <div id="olt-view-detalhes" style="display: none;">
                    <button class="btn-voltar-placas" onclick="backToOltPlacas()">
                        <span class="material-symbols-rounded">arrow_back</span> Voltar para Placas
                    </button>
                    
                    <h4 id="olt-placa-subtitle">Detalhes - Placa X</h4>
                    
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr class="table-header-row">
                                    <th>Porta</th>
                                    <th>Circuitos</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="olt-detalhes-tbody">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="config.js"></script>
    <script src="api-service.js"></script>
    <script src="layout.js"></script>
    <script src="olt-engine.js"></script>
    <script src="olt-page.js"></script> 
</body>
</html>
