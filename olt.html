<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status das OLTs - Monitoramento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="olt.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            <div id="overview-grid" class="grid-container">
                </div>
        </main>
    </div>

    <div id="super-modal" class="modal-overlay" onclick="closeSuperModal(event)">
        <div class="modal-content modal-large">
            
            <div class="modal-header">
                <div>
                    <h3 id="super-modal-title">
                        <span class="material-symbols-rounded">dns</span> Detalhes da OLT
                    </h3>
                    <p id="olt-modal-last-update">
                        <span class="material-symbols-rounded">calendar_today</span> <span id="olt-update-date">--/--/----</span>
                        <span>|</span>
                        <span class="material-symbols-rounded">schedule</span> <span id="olt-update-time">--:--:--</span>
                    </p>
                </div>
                <button class="close-modal" onclick="closeSuperModal()" title="Fechar">&times;</button>
            </div>

            <div class="modal-body">
                
                <div id="olt-view-placas">
                    <p>Selecione uma placa para ver os detalhes das portas:</p>
                    <div id="olt-placas-list" class="placas-grid">
                        </div>
                </div>

                <div id="olt-view-detalhes" style="display: none;">
                    <button class="btn-voltar-placas" onclick="backToOltPlacas()">
                        <span class="material-symbols-rounded">arrow_back</span> Voltar para Placas
                    </button>
                    
                    <h4 id="olt-placa-subtitle">Detalhes - Placa X</h4>
                    
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr class="table-header-row">
                                    <th>Porta</th>
                                    <th>Circuitos</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="olt-detalhes-tbody">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="layout.js"></script>
    <script src="olt-engine.js"></script>

    <script>
        const oltsConfig = [
            { id: 'HEL-1', sheetTab: 'HEL1', type: 'nokia', boards: 8 },
            { id: 'HEL-2', sheetTab: 'HEL2', type: 'nokia', boards: 8 },
            { id: 'PQA-1', sheetTab: 'PQA1', type: 'nokia', boards: 8 },
            { id: 'PSV-1', sheetTab: 'PSV1', type: 'nokia', boards: 8 },
            { id: 'MGP',   sheetTab: 'MGP',  type: 'nokia', boards: 8 },
            { id: 'LTXV-1', sheetTab: 'LTXV1', type: 'furukawa-10', boards: 10 }, 
            { id: 'LTXV-2', sheetTab: 'LTXV2', type: 'furukawa-2', boards: 2 },
            { id: 'PQA-2',  sheetTab: 'PQA2',  type: 'furukawa-2', boards: 2 },
            { id: 'PQA-3',  sheetTab: 'PQA3',  type: 'furukawa-2', boards: 2 },
            { id: 'SB-1',   sheetTab: 'SB1',   type: 'furukawa-2', boards: 2 },
            { id: 'SB-2',   sheetTab: 'SB2',   type: 'furukawa-2', boards: 2 },
            { id: 'SB-3',   sheetTab: 'SB3',   type: 'furukawa-2', boards: 2 },
            { id: 'PSV-7',  sheetTab: 'PSV7',  type: 'furukawa-2', boards: 2 },
            { id: 'SBO-1',  sheetTab: 'SBO1',  type: 'furukawa-10', boards: 10 },
            { id: 'SBO-2',  sheetTab: 'SBO2',  type: 'furukawa-2', boards: 2 },
            { id: 'SBO-3',  sheetTab: 'SBO3',  type: 'furukawa-2', boards: 2 },
            { id: 'SBO-4',  sheetTab: 'SBO4',  type: 'furukawa-2', boards: 2 }
        ];

        const API_KEY = 'AIzaSyA88uPhiRhU3JZwKYjA5B1rX7ndXpfka0I';
        const SHEET_ID = '1BDx0zd0UGzOr2qqg1nftfe5WLUMh6MkcFO5psAG5GtU';
        const REFRESH_INTERVAL_SECONDS = 300;
        
        function createCardPlaceholders() {
            const grid = document.getElementById('overview-grid');
            grid.innerHTML = ''; 
            
            oltsConfig.forEach(olt => {
                grid.innerHTML += `
                    <div class="overview-card" id="card-${olt.id}">
                        <div class="card-header">
                            <h3><span class="material-symbols-rounded">dns</span> ${olt.id}</h3>
                            <button onclick="openSuperModal('${olt.id}', '${olt.sheetTab}', '${olt.type}', ${olt.boards})" class="card-header-button" title="Ver Placas e Portas">
                                <span class="material-symbols-rounded">manage_search</span>
                            </button>
                        </div>
                        <div class="card-body">
                             <div class="card-stats">
                                <p>Carregando...</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        
        async function fetchOltData(olt) {
            const range = olt.type === 'nokia' ? `${olt.sheetTab}!A:E` : `${olt.sheetTab}!A:C`;
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Falha ao buscar dados da aba ${olt.sheetTab}`);
                const data = await response.json();
                const rows = (data.values || []).slice(1);
                
                let totalOnline = 0;
                let totalOffline = 0;

                rows.forEach(columns => {
                    if (columns.length === 0) return;
                    let isOnline;

                    if (olt.type === 'nokia') {
                        const status = columns[4] || '';
                        isOnline = status.trim().toLowerCase().includes('up');
                    } else { 
                        const status = columns[2] || '';
                        isOnline = status.trim().toLowerCase() === 'active';
                    }

                    if (isOnline) totalOnline++; else totalOffline++;
                });

                updateCardUI(olt.id, { onlineCount: totalOnline, offlineCount: totalOffline, type: olt.type });
                
            } catch (error) {
                console.error(`Erro para OLT ${olt.id}:`, error);
                updateCardUI(olt.id, { error: true });
            }
        }
        
        function updateCardUI(oltId, data) {
            const card = document.getElementById(`card-${oltId}`);
            if (!card) return;
            if (data.error) {
                card.querySelector('.card-stats').innerHTML = `<p style="color: #f87171;">Erro ao carregar.</p>`;
                return;
            }
            const { onlineCount, offlineCount, type } = data;
            const total = onlineCount + offlineCount;
            const onlinePercent = total > 0 ? (onlineCount / total) * 100 : 0;
            const offlinePercent = 100 - onlinePercent;
            
            const header = card.querySelector('.card-header');
            header.classList.remove('status-normal', 'status-atencao', 'status-problema');
            
            if (offlinePercent > 15 || offlineCount >= 300) { 
                header.classList.add('status-problema'); 
            }
            else if (offlinePercent > 8 || offlineCount >= 150) { 
                header.classList.add('status-atencao'); 
            }
            else { 
                header.classList.add('status-normal'); 
            }
            
            const statsHtml = `
                <div class="stat-item">
                    <span class="stat-number">${total}</span>
                    <label><span class="material-symbols-rounded icon-total">router</span> Total</label>
                </div>
                <div class="stat-item online">
                    <span class="stat-number">${onlineCount}</span>
                    <label><span class="material-symbols-rounded icon-up">check_circle</span> ${type === 'nokia' ? 'Up' : 'Active'}</label>
                </div>
                <div class="stat-item offline">
                    <span class="stat-number">${offlineCount}</span>
                    <label><span class="material-symbols-rounded icon-down">error</span> ${type === 'nokia' ? 'Down' : 'Inactive'}</label>
                </div>
            `;
            
            const newRadius = 40; 
            const circumference = 2 * Math.PI * newRadius; 
            const offset = circumference - (onlinePercent / 100) * circumference;
            const chartHtml = `
                <div class="donut-chart-container">
                    <svg class="donut-chart" width="100" height="100" viewBox="0 0 100 100">
                        <circle class="donut-bg" cx="50" cy="50" r="${newRadius}"></circle>
                        <circle class="donut-fg" cx="50" cy="50" r="${newRadius}"
                            stroke-dasharray="${circumference}"
                            stroke-dashoffset="${offset}">
                        </circle>
                    </svg>
                    <div class="chart-text"><span class="stat-number">${Math.round(onlinePercent)}%</span></div>
                </div>
            `;

            card.querySelector('.card-body').innerHTML = `<div class="card-stats">${statsHtml}</div>${chartHtml}`;
        }

        async function runOverview() {
            const timestampEl = document.getElementById('update-timestamp');
            if (timestampEl && (timestampEl.textContent === "" || timestampEl.textContent.includes('Aguardando'))) {
                timestampEl.innerHTML = '<span class="material-symbols-rounded">hourglass_empty</span> Buscando dados...';
            }
            
            if(document.getElementById('overview-grid').innerHTML.trim() === "") {
                createCardPlaceholders();
            }
            
            const oltPromises = oltsConfig.map(olt => fetchOltData(olt));
            await Promise.all(oltPromises);
            
            const now = new Date();
            const dataHoje = now.toLocaleDateString('pt-BR');
            const horaAgora = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            if(timestampEl) {
                timestampEl.innerHTML = `
                    <span class="material-symbols-rounded">calendar_today</span> ${dataHoje}
                    <span>|</span>
                    <span class="material-symbols-rounded">schedule</span> ${horaAgora}
                `;
                timestampEl.classList.remove('updated-anim');
                void timestampEl.offsetWidth; 
                timestampEl.classList.add('updated-anim');
            }
        }
        
        // ==============================================================================
        // CONTROLADORES DO SUPER MODAL (NOVO FLUXO MD3)
        // ==============================================================================
        
        function openSuperModal(id, sheetTab, type, boards) {
            document.getElementById('super-modal-title').innerHTML = `<span class="material-symbols-rounded">dns</span> ${id}`;
            document.getElementById('olt-view-detalhes').style.display = 'none';
            document.getElementById('olt-view-placas').style.display = 'block';
            
            document.getElementById('olt-update-date').textContent = '--/--/----';
            document.getElementById('olt-update-time').textContent = '--:--:--';
            
            document.getElementById('olt-placas-list').innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                    <span class="material-symbols-rounded" style="font-size: 48px; display: block; margin-bottom: 10px;">hourglass_top</span>
                    <h2>Estabelecendo conexão com a OLT...</h2>
                    <p>Buscando status de placas, portas e circuitos.</p>
                </div>
            `;
            
            document.getElementById('super-modal').style.display = 'flex';
            
            if (typeof startOltMonitoring === 'function') {
                startOltMonitoring({
                    id: sheetTab,
                    type: type,
                    boards: boards,
                    oltName: id 
                });
            }
        }

        function backToOltPlacas() {
            document.getElementById('olt-view-detalhes').style.display = 'none';
            document.getElementById('olt-view-placas').style.display = 'block';
        }

        function closeSuperModal(event) {
            if (event && event.target.id !== 'super-modal' && !event.target.classList.contains('close-modal')) return;
            document.getElementById('super-modal').style.display = 'none';
            document.getElementById('olt-placas-list').innerHTML = ''; 
            
            if (typeof stopOltMonitoring === 'function') {
                stopOltMonitoring();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadHeader({ title: "Status das OLTs", exactTitle: true });
            loadFooter();
            runOverview();
            setInterval(runOverview, REFRESH_INTERVAL_SECONDS * 1000);
        });
    </script>
</body>
</html>
