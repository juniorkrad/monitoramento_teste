<!-- pop.html -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status dos POPs - Monitoramento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="pop.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#67079f">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            <div class="header-title" style="display: flex; align-items: center; gap: 12px; margin-bottom: 30px; font-size: 1.8rem; color: var(--m3-primary);">
                <span class="material-symbols-rounded" style="font-size: 32px;">domain</span>
                Resumo Operacional por POP
            </div>
            
            <div id="pop-grid" class="grid-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 20px; width: 100%;">
                <!-- Os cards dos POPs serão gerados aqui dinamicamente pelo pop-engine.js -->
            </div>
        </main>
    </div>

    <!-- Modal de Detalhes do POP (Resumo das OLTs) -->
    <div id="pop-modal" class="modal-overlay" style="display: none;" onclick="closePopModal(event)">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 id="pop-modal-title" style="margin: 0; display: flex; align-items: center; gap: 8px;">
                    <span class="material-symbols-rounded">domain</span> Detalhes do POP
                </h3>
                <button class="close-modal" onclick="closePopModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="table-container">
                    <table class="noc-table">
                        <thead>
                            <tr class="table-header-row">
                                <th style="text-align: left;">OLT</th>
                                <th>TOTAL</th>
                                <th>ONLINE</th>
                                <th>OFFLINE</th>
                                <th>ENERGIA</th>
                                <th>POTÊNCIA</th>
                                <th>TEMP.</th>
                            </tr>
                        </thead>
                        <tbody id="pop-detalhes-tbody">
                            <!-- Preenchido dinamicamente pelo pop-engine.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- Core do Sistema -->
    <script src="config.js"></script>
    <script src="api-service.js"></script>
    <script src="data-mapper.js"></script>
    <script src="data-store.js"></script>
    <script src="layout.js"></script>
    <script src="notifications.js"></script>
    
    <!-- Bibliotecas Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Scripts Reaproveitados -->
    <script src="olt-relatorio.js"></script>
    <script src="olt-comunicado.js"></script>
    <script src="energia-relatorio.js"></script>
    <script src="relatorio-pdf.js"></script>
    
    <!-- Motor Exclusivo desta Página -->
    <script src="pop-engine.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registrado com sucesso!'))
                .catch(err => console.error('Erro ao registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
