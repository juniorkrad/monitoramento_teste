<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSV-1 | Monitoramento</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div id="toast-container"></div>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content">
            
            <div class="stats-row">
                <div class="stat-card">
                    <h3>Total</h3>
                    <p id="stat-total" class="stat-number">-</p>
                </div>
                <div class="stat-card success">
                    <h3>Online</h3>
                    <p id="stat-online" class="stat-number">-</p>
                </div>
                <div class="stat-card error">
                    <h3>Offline</h3>
                    <p id="stat-offline" class="stat-number">-</p>
                </div>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Interface</th>
                            <th>Status</th>
                            <th>Serial</th>
                            <th>Descrição</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="4" class="loading-cell">Carregando dados locais...</td></tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="layout.js"></script>
    <script src="notifications.js"></script>
    <script src="olt-engine.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Carrega Layout
            loadHeader({
                title: "PSV-1",
                buttonText: "Home",
                buttonLink: "index.html"
            });
            loadFooter();

            // 2. Configura a OLT
            const config = {
                id: 'PSV-1',    // O script vai transformar em: dados_psv1.json
                type: 'nokia'   // Tipo Nokia
            };

            // 3. Inicia o Motor Local
            startOltEngine(config);
            
            // Atualiza a cada 5 minutos
            setInterval(() => startOltEngine(config), 300000);
        });
    </script>
</body>
</html>
