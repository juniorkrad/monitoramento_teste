<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potência Óptica - NOC</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="potencia.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div id="toast-container"></div>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            
            <div id="global-potencia-body" style="display: none;"></div>
            
            <div id="potencia-grid" class="grid-container">
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                    <span class="material-symbols-rounded rotate-anim" style="font-size: 40px; color: var(--m3-on-surface-variant);">sync</span>
                    <p style="color: var(--m3-on-surface-variant);">Processando potências da rede...</p>
                </div>
            </div>

        </main>
    </div>

    <div id="footer-placeholder"></div>

    <div id="potencia-modal" class="modal-overlay" onclick="fecharModalPotencia(event)">
        <div class="modal-content modal-large">
            
            <div class="modal-header">
                <div>
                    <h3 id="modal-potencia-title" style="margin: 0; display: flex; align-items: center; gap: 8px;">
                        <span class="material-symbols-rounded">dns</span> OLT Selecionada
                    </h3>
                    <p id="modal-potencia-last-update" style="margin: 5px 0 0 0; font-size: 0.85rem; color: var(--m3-on-surface); font-family: var(--font-family-mono); display: flex; align-items: center; gap: 5px;">
                        <span class="material-symbols-rounded" style="font-size: 14px;">calendar_today</span> <span id="potencia-update-date">--/--/----</span>
                        <span style="color: rgba(255,255,255,0.3); margin: 0 4px;">|</span>
                        <span class="material-symbols-rounded" style="font-size: 14px;">schedule</span> <span id="potencia-update-time">--:--:--</span>
                    </p>
                </div>
                <button class="close-modal" onclick="fecharModalPotencia()" title="Fechar">&times;</button>
            </div>
            
            <div class="modal-body">
                <div class="search-bar-container">
                    <input type="text" id="potencia-search" class="search-input" placeholder="Buscar por porta, serial ou código..." onkeyup="filtrarTabelaPotencia()">
                </div>
                
                <div class="potencia-table-container">
                    <table class="potencia-table" id="tabela-potencia">
                        <thead>
                            <tr>
                                <th>Placa/Porta</th>
                                <th>Serial do Equip.</th>
                                <th>Potência (dBm)</th>
                                <th>Código Cliente</th>
                            </tr>
                        </thead>
                        <tbody id="potencia-tbody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="layout.js"></script>
    <script src="notifications.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader({ title: "Análise de Potência", exactTitle: true });
            loadFooter();
        });

        // Funções de controle do Modal
        function fecharModalPotencia(event) {
            if (event && event.target.id !== 'potencia-modal' && !event.target.classList.contains('close-modal')) return;
            document.getElementById('potencia-modal').style.display = 'none';
        }

        function filtrarTabelaPotencia() {
            const termo = document.getElementById('potencia-search').value.toLowerCase();
            const linhas = document.querySelectorAll('.linha-cliente-potencia');
            
            linhas.forEach(linha => {
                const texto = linha.textContent.toLowerCase();
                linha.style.display = texto.includes(termo) ? '' : 'none';
            });
        }
    </script>

    <script src="potencia-engine.js"></script>

</body>
</html>
