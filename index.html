<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Gerencial - Monitoramento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        /* Ajustes específicos para os Widgets da Home */
        .global-card {
            width: 100% !important;
            max-width: 100% !important;
            margin-bottom: 20px;
            background: var(--m3-surface-container);
            border-radius: 24px;
            border: 1px solid var(--m3-outline);
            overflow: hidden;
        }

        .global-card-header {
            padding: 16px 24px;
            background: rgba(234, 208, 255, 0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .global-card-header h3 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            color: var(--m3-on-surface);
        }

        .global-card-body {
            padding: 24px;
        }

        /* Estilos de badges para o widget de Energia */
        .impact-badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .impact-high { background: rgba(245, 108, 108, 0.2); color: #f56c6c; border: 1px solid #f56c6c; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            
            <div id="backbone-alert-container" style="display: none; width: 100%; margin-bottom: 20px;"></div>

            <div class="global-card" id="energy-summary-card">
                <div class="global-card-header">
                    <h3><span class="material-symbols-rounded" style="color: #e6a23c;">bolt</span> Resumo Crítico de Energia</h3>
                    <a href="energia.html" class="card-header-button" title="Ver Painel Completo">
                        <span class="material-symbols-rounded">open_in_new</span>
                    </a>
                </div>
                <div class="global-card-body" id="global-energy-body">
                    <div style="text-align: center; padding: 20px; color: var(--m3-on-surface-variant);">
                        <span class="material-symbols-rounded" style="font-size: 40px; display: block; margin-bottom: 10px;">hourglass_empty</span>
                        Carregando status de energia...
                    </div>
                </div>
            </div>

            <div class="global-card" id="potencia-summary-card">
                <div class="global-card-header">
                    <h3><span class="material-symbols-rounded" style="color: #b388ff;">sensors</span> Resumo de Sinais Críticos (dBm)</h3>
                    <a href="potencia.html" class="card-header-button" title="Ver Painel Completo">
                        <span class="material-symbols-rounded">open_in_new</span>
                    </a>
                </div>
                <div class="global-card-body" id="global-potencia-body">
                    <div style="text-align: center; padding: 20px; color: var(--m3-on-surface-variant);">
                        <span class="material-symbols-rounded" style="font-size: 40px; display: block; margin-bottom: 10px;">hourglass_empty</span>
                        Analisando potências da rede...
                    </div>
                </div>
            </div>

            <div class="overview-grid" id="main-overview-grid">
                </div>

        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="layout.js"></script>
    
    <script src="energia-engine.js"></script>
    <script src="potencia-engine.js"></script>
    
    <script>
        const REFRESH_INTERVAL_SECONDS = 300; 

        async function runOverview() {
            // Se você tiver um overview-engine.js para outros cards, chame-o aqui
            console.log("Dashboard: Atualizando motores...");
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader({ title: "Dashboard Gerencial", exactTitle: true });
            loadFooter();
            
            // Dispara o motor de Energia (já otimizado para a Home)
            if (typeof startEnergyMonitoring === 'function') {
                startEnergyMonitoring();
                setInterval(startEnergyMonitoring, REFRESH_INTERVAL_SECONDS * 1000);
            }

            // Dispara o motor de Potência (já otimizado para a Home)
            if (typeof runPotenciaEngine === 'function') {
                runPotenciaEngine();
                setInterval(runPotenciaEngine, REFRESH_INTERVAL_SECONDS * 1000);
            }
        });
    </script>
</body>
</html>
