<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Monitoramento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div id="toast-container"></div>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content">
            <div id="overview-grid" class="grid-container">
                </div>
        </main>
    </div>

    <div id="footer-placeholder"></div>

<script>
        const oltsConfig = [
            { id: 'HEL-1', sheetTab: 'HEL1', type: 'nokia' },
            { id: 'HEL-2', sheetTab: 'HEL2', type: 'nokia' },
            { id: 'PQA-1', sheetTab: 'PQA1', type: 'nokia' },
            { id: 'PSV-1', sheetTab: 'PSV1', type: 'nokia' },
            { id: 'MGP',   sheetTab: 'MGP',  type: 'nokia' },
            { id: 'LTXV-1', sheetTab: 'LTXV1', type: 'furukawa' },
            { id: 'LTXV-2', sheetTab: 'LTXV2', type: 'furukawa' },
            { id: 'PQA-2',  sheetTab: 'PQA2',  type: 'furukawa' },
            { id: 'PQA-3',  sheetTab: 'PQA3',  type: 'furukawa' },
            { id: 'SB-1',   sheetTab: 'SB1',   type: 'furukawa' },
            { id: 'SB-2',   sheetTab: 'SB2',   type: 'furukawa' },
            { id: 'SB-3',   sheetTab: 'SB3',   type: 'furukawa' },
            { id: 'PSV-7',  sheetTab: 'PSV7',  type: 'furukawa' },
            { id: 'SBO-1',  sheetTab: 'SBO1',  type: 'furukawa' },
            { id: 'SBO-2',  sheetTab: 'SBO2',  type: 'furukawa' },
            { id: 'SBO-3',  sheetTab: 'SBO3',  type: 'furukawa' },
            { id: 'SBO-4',  sheetTab: 'SBO4',  type: 'furukawa' },
        ];

        const API_KEY = 'AIzaSyA88uPhiRhU3JZwKYjA5B1rX7ndXpfka0I';
        const SHEET_ID = '1BDx0zd0UGzOr2qqg1nftfe5WLUMh6MkcFO5psAG5GtU';
        const REFRESH_INTERVAL_SECONDS = 300;
        
        // Função para criar os cards APENAS UMA VEZ
        function createCardPlaceholders() {
            const grid = document.getElementById('overview-grid');
            // Se o grid já tiver conteúdo, não recria
            if (grid.children.length > 0) return;

            grid.innerHTML = '';
            oltsConfig.forEach(olt => {
                const pageUrl = olt.id.toLowerCase().replace('-', '') + '.html';
                // Adicionamos classes para animação CSS no SVG
                grid.innerHTML += `
                    <div class="overview-card" id="card-${olt.id}">
                        <div class="card-header">
                            <h3>${olt.id}</h3>
                            <a href="${pageUrl}" class="card-header-button">Detalhes →</a>
                        </div>
                        <div class="card-body">
                             <div class="card-stats">
                                <p class="loading-text">Carregando dados...</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        
        async function fetchOltData(olt) {
            // Nokia usa coluna E (index 4), Furukawa usa C (index 2) - Otimizando range
            const range = olt.type === 'nokia' ? `${olt.sheetTab}!E:E` : `${olt.sheetTab}!C:C`;
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                // Remove cabeçalho se houver e filtra vazios
                const rows = (data.values || []).slice(1).flat();
                
                let onlineCount = 0;
                let offlineCount = 0;

                rows.forEach(status => {
                    if (!status) return;
                    const s = status.trim().toLowerCase();
                    
                    if (olt.type === 'nokia') {
                        if (s.includes('up')) onlineCount++;
                        else offlineCount++;
                    } else {
                        if (s === 'active') onlineCount++;
                        else if (s === 'inactive') offlineCount++;
                    }
                });

                updateCardUI(olt.id, { onlineCount, offlineCount, type: olt.type });
            } catch (error) {
                console.error(`Erro OLT ${olt.id}:`, error);
                updateCardUI(olt.id, { error: true });
            }
        }
        
        function updateCardUI(oltId, data) {
            const card = document.getElementById(`card-${oltId}`);
            if (!card) return;

            const cardBody = card.querySelector('.card-body');

            if (data.error) {
                // Mantém o tamanho do card mesmo com erro para não quebrar o grid
                cardBody.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color: var(--status-problem);">
                        <span>⚠️ Falha na conexão</span>
                        <small>Tentando novamente...</small>
                    </div>`;
                return;
            }

            const { onlineCount, offlineCount, type } = data;
            const total = onlineCount + offlineCount;
            const onlinePercent = total > 0 ? (onlineCount / total) * 100 : 0;
            const offlinePercent = 100 - onlinePercent;

            // Atualiza status do header
            const header = card.querySelector('.card-header');
            header.className = 'card-header'; // Reseta classes
            if (offlinePercent > 10) header.classList.add('status-problema');
            else if (offlinePercent > 5) header.classList.add('status-atencao');
            else header.classList.add('status-normal');

            // HTML dos números
            const statsHtml = `
                <div class="stat-item"><span>${total}</span><label>Total</label></div>
                <div class="stat-item online"><span>${onlineCount}</span><label>${type === 'nokia' ? 'Up' : 'Active'}</label></div>
                <div class="stat-item offline"><span>${offlineCount}</span><label>${type === 'nokia' ? 'Down' : 'Inactive'}</label></div>
            `;
            
            // Lógica do Gráfico
            const newRadius = 40;
            const circumference = 2 * Math.PI * newRadius;
            const offset = circumference - (onlinePercent / 100) * circumference;
            
            // Adicionado style="transition..." para animação suave
            const chartHtml = `
                <div class="donut-chart-container">
                    <svg class="donut-chart" width="100" height="100" viewBox="0 0 100 100">
                        <circle class="donut-bg" cx="50" cy="50" r="${newRadius}"></circle>
                        <circle class="donut-fg" cx="50" cy="50" r="${newRadius}"
                            stroke-dasharray="${circumference}"
                            stroke-dashoffset="${offset}"
                            style="transition: stroke-dashoffset 1s ease-in-out;">
                        </circle>
                    </svg>
                    <div class="chart-text">${Math.round(onlinePercent)}%</div>
                </div>
            `;

            cardBody.innerHTML = `<div class="card-stats">${statsHtml}</div>${chartHtml}`;
        }

        async function runOverview() {
            const timestampEl = document.getElementById('update-timestamp');
            if (timestampEl) timestampEl.textContent = "Atualizando dados...";

            // Removido createCardPlaceholders daqui para não recriar o DOM
            
            const promises = oltsConfig.map(olt => fetchOltData(olt));
            await Promise.all(promises);

            const now = new Date();
            const timestampText = `Atualizado em: ${now.toLocaleDateString('pt-BR')} às ${now.toLocaleTimeString('pt-BR')}`;
            if(timestampEl) timestampEl.textContent = timestampText;
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader({ title: "Painel de Monitoramento" });
            loadFooter();

            // 1. Cria a estrutura (placeholders) uma única vez
            createCardPlaceholders();

            // 2. Busca os dados imediatamente
            runOverview();

            // 3. Configura o intervalo
            setInterval(runOverview, REFRESH_INTERVAL_SECONDS * 1000);
        });
    </script>
    
    <script src="layout.js"></script>
    <script src="notifications.js"></script>

</body>
</html>
