<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Gerencial - Monitoramento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="notifications.css"> 
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div id="toast-container"></div>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="display: flex; flex-direction: column; flex: 1; justify-content: space-between; min-height: 80vh;">
            
            <div id="backbone-alert-container" style="display: none; width: 100%;"></div>

            <div id="global-overview-container" style="width: 100%;">
                <div class="global-card" id="card-global">
                    <div class="card-header">
                        <h3>
                            <span class="material-symbols-rounded" style="color: #4ade80;">public</span> MONITORAMENTO DA REDE
                        </h3>
                        <a href="olt.html" class="card-header-button" title="Ver Status das OLTs">
                            <span class="material-symbols-rounded" style="font-size: 22px;">open_in_new</span>
                        </a>
                    </div>
                    <div class="card-body">
                        <p style="color: var(--m3-on-surface-variant);">Processando saúde da rede e alarmes...</p>
                    </div>
                </div>
            </div>
            
            <div id="dashboard-widgets" style="display: flex; flex-direction: column; width: 100%; flex: 1; justify-content: space-evenly;">
                
                <div class="global-card">
                    <div class="card-header">
                        <h3>
                            <span class="material-symbols-rounded" style="color: #f87171;">bolt</span> MONITORAMENTO DE ENERGIA
                        </h3>
                        <a href="energia.html" class="card-header-button" title="Ver Painel Completo">
                            <span class="material-symbols-rounded" style="font-size: 22px;">open_in_new</span>
                        </a>
                    </div>
                    <div class="card-body">
                        <span id="global-poweroff-total" style="display: none;"></span>
                        <p style="color: var(--m3-on-surface-variant);">Processando dados de falha de energia (Dying Gasp)...</p>
                    </div>
                </div>

                <div class="global-card">
                    <div class="card-header">
                        <h3>
                            <span class="material-symbols-rounded" style="color: #fbbf24;">sensors</span> MONITORAMENTO DE POTÊNCIA
                        </h3>
                        <a href="potencia.html" class="card-header-button" title="Ver Painel Completo">
                            <span class="material-symbols-rounded" style="font-size: 22px;">open_in_new</span>
                        </a>
                    </div>
                    <div class="card-body" id="global-potencia-body">
                        <p style="color: var(--m3-on-surface-variant);">Processando dados de sinais e potência óptica...</p>
                    </div>
                </div>

            </div>

            <div id="energy-olt-grid" style="display: none;"></div>
            <div id="potencia-grid" style="display: none;"></div>

        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="layout.js"></script>
    <script src="notifications.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="olt-engine.js"></script>
    <script src="energia-engine.js"></script>
    <script src="potencia-engine.js"></script>
    
    <script src="home-engine.js"></script>

</body>
</html>
