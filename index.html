<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Gerencial - Monitoramento</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div id="toast-container"></div>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content">
            
            <div id="backbone-alert-container" style="display: none; width: 100%; margin-bottom: 20px;"></div>

            <div id="global-overview-container" class="widget-container"></div>
            
            <div id="dashboard-widgets" class="dashboard-widgets-group">
                
                <div class="global-card">
                    <div class="card-header">
                        <h3>
                            <span class="material-symbols-rounded icon-energia">bolt</span> ALARME DE ENERGIA (DYING GASP)
                        </h3>
                        <a href="energia.html" class="card-header-button" title="Ver Painel Completo">
                            <span class="material-symbols-rounded icon-action">open_in_new</span>
                        </a>
                    </div>
                    <div class="card-body energy-master-body">
                        <div class="energy-master-left">
                            <div class="energy-left-header">
                                <span class="energy-left-title">CLIENTES SEM ENERGIA</span>
                                <span class="material-symbols-rounded energy-left-icon">power_off</span>
                            </div>
                            <h2 id="global-poweroff-total" class="energy-main-value">0</h2>
                            <div id="global-poweroff-context" class="energy-context">
                                <p><span class="material-symbols-rounded">dns</span> <strong id="global-olts-afetadas">0</strong> de 17 OLTs afetadas.</p>
                                <p><span class="material-symbols-rounded">public</span> Impacto rede: <strong id="global-impacto-perc">0%</strong></p>
                                <p><span class="material-symbols-rounded">pie_chart</span> Relativo OFF: <strong id="global-offline-relativo-perc" class="energy-highlight">0%</strong></p>
                            </div>
                        </div>

                        <div class="energy-master-right">
                            <div class="energy-right-header">
                                <span class="material-symbols-rounded">bar_chart</span>
                                <h3>Ranking de OLTs Críticas</h3>
                            </div>
                            <div class="energy-chart-wrapper">
                                <div class="energy-chart-inner">
                                    <canvas id="energyChartOlt"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="global-card">
                    <div class="card-header">
                        <h3>
                            <span class="material-symbols-rounded icon-potencia">sensors</span> SAÚDE DO SINAL (POTÊNCIA ÓPTICA)
                        </h3>
                        <a href="potencia.html" class="card-header-button" title="Ver Painel Completo">
                            <span class="material-symbols-rounded icon-action">open_in_new</span>
                        </a>
                    </div>
                    <div class="card-body potencia-master-body" id="global-potencia-body">
                        <p class="loading-text">Processando dados de potência óptica...</p>
                    </div>
                </div>

            </div>

            <div id="energy-olt-grid" style="display: none;"></div>
            <div id="potencia-grid" style="display: none;"></div>

        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="layout.js"></script>
    <script src="notifications.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="energia-engine.js"></script>
    <script src="potencia-engine.js"></script>

    <script>
        const oltsConfig = [
            { id: 'HEL-1', sheetTab: 'HEL1', type: 'nokia' },
            { id: 'HEL-2', sheetTab: 'HEL2', type: 'nokia' },
            { id: 'PQA-1', sheetTab: 'PQA1', type: 'nokia' },
            { id: 'PSV-1', sheetTab: 'PSV1', type: 'nokia' },
            { id: 'MGP',   sheetTab: 'MGP',  type: 'nokia' },
            { id: 'LTXV-1', sheetTab: 'LTXV1', type: 'furukawa-10' }, 
            { id: 'LTXV-2', sheetTab: 'LTXV2', type: 'furukawa-2' },
            { id: 'PQA-2',  sheetTab: 'PQA2',  type: 'furukawa-2' },
            { id: 'PQA-3',  sheetTab: 'PQA3',  type: 'furukawa-2' },
            { id: 'SB-1',   sheetTab: 'SB1',   type: 'furukawa-2' },
            { id: 'SB-2',   sheetTab: 'SB2',   type: 'furukawa-2' },
            { id: 'SB-3',   sheetTab: 'SB3',   type: 'furukawa-2' },
            { id: 'PSV-7',  sheetTab: 'PSV7',  type: 'furukawa-2' },
            { id: 'SBO-1',  sheetTab: 'SBO1',  type: 'furukawa-10' },
            { id: 'SBO-2',  sheetTab: 'SBO2',  type: 'furukawa-2' },
            { id: 'SBO-3',  sheetTab: 'SBO3',  type: 'furukawa-2' },
            { id: 'SBO-4',  sheetTab: 'SBO4',  type: 'furukawa-2' },
        ];

        const ENERGY_MAP = {
            'HEL-1': 0, 'HEL-2': 4, 'PQA-1': 8, 'PSV-1': 12, 'MGP': 16,
            'LTXV-1': 20, 'SBO-1': 24, 'LTXV-2': 28, 'PQA-2': 32, 'PQA-3': 36,
            'SB-1': 40, 'SB-2': 44, 'SB-3': 48, 'SBO-2': 52, 'SBO-3': 56,
            'SBO-4': 60, 'PSV-7': 64
        };

        const API_KEY = 'AIzaSyA88uPhiRhU3JZwKYjA5B1rX7ndXpfka0I';
        const SHEET_ID = '1BDx0zd0UGzOr2qqg1nftfe5WLUMh6MkcFO5psAG5GtU';
        const REFRESH_INTERVAL_SECONDS = 300;
        
        function createCardPlaceholders() {
            const globalContainer = document.getElementById('global-overview-container');
            // HTML Gerado limpo de inline styles
            globalContainer.innerHTML = `
                <div class="global-card" id="card-global">
                    <div class="card-header">
                        <h3>
                            <span class="material-symbols-rounded icon-visaogeral">public</span> VISÃO GERAL DA REDE
                        </h3>
                        <a href="olt.html" class="card-header-button" title="Ver Status das OLTs">
                            <span class="material-symbols-rounded icon-action">open_in_new</span>
                        </a>
                    </div>
                    <div class="card-body">
                         <div class="card-stats">
                            <p class="loading-text">Analisando saúde da rede e alarmes...</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        async function fetchOltData(olt) {
            const range = olt.type === 'nokia' ? `${olt.sheetTab}!A:E` : `${olt.sheetTab}!A:C`;
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`Falha aba ${olt.sheetTab}`);
                const data = await response.json();
                const rows = (data.values || []).slice(1);
                
                let totalOnline = 0;
                let totalOffline = 0;
                const portData = {};

                rows.forEach(columns => {
                    if (columns.length === 0) return;
                    let placa, porta, isOnline;

                    if (olt.type === 'nokia') {
                        isOnline = (columns[4] || '').trim().toLowerCase().includes('up');
                        if (columns[0] && columns[0].includes('1/1/')) {
                            const parts = columns[0].split('/');
                            if (parts.length >= 4) { placa = parts[2]; porta = parts[3]; }
                        }
                    } else { 
                        isOnline = (columns[2] || '').trim().toLowerCase() === 'active';
                        if (columns[0]) {
                            if (olt.type === 'furukawa-10') {
                                const parts = columns[0].split('/');
                                if (parts.length >= 2) { placa = parts[0]; porta = parts[1]; }
                            } else { 
                                const match = columns[0].match(/GPON(\d+)\/(\d+)/);
                                if (match) { placa = match[1]; porta = match[2]; }
                            }
                        }
                    }

                    if (isOnline) totalOnline++; else totalOffline++;
                    if (placa && porta) {
                        const portKey = `${placa}/${porta}`;
                        if (!portData[portKey]) portData[portKey] = { off: 0, total: 0 };
                        portData[portKey].total++;
                        if (!isOnline) portData[portKey].off++;
                    }
                });

                return { id: olt.id, onlineCount: totalOnline, offlineCount: totalOffline, type: olt.type, portData };
            } catch (error) {
                return { id: olt.id, onlineCount: 0, offlineCount: 0, type: olt.type, portData: {} };
            }
        }
        
        function updateGlobalCardUI(globalOnline, globalOffline, nokiaOnline, nokiaTotal, furukawaOnline, furukawaTotal, top3Olts) {
            const card = document.getElementById('card-global');
            if (!card) return;
            
            const total = globalOnline + globalOffline;
            
            const statsHtml = `
                <div class="stat-item global-stat">
                    <span class="stat-number">${total}</span>
                    <label><span class="material-symbols-rounded icon-total">router</span> Total Geral</label>
                </div>
                <div class="stat-item online global-stat">
                    <span class="stat-number">${globalOnline}</span>
                    <label><span class="material-symbols-rounded icon-up">check_circle</span> Equipamentos Online</label>
                </div>
                <div class="stat-item offline global-stat">
                    <span class="stat-number">${globalOffline}</span>
                    <label><span class="material-symbols-rounded icon-down">error</span> Equipamentos Offline</label>
                </div>
            `;

            const nokiaPct = nokiaTotal > 0 ? (nokiaOnline / nokiaTotal) * 100 : 0;
            const furukawaPct = furukawaTotal > 0 ? (furukawaOnline / furukawaTotal) * 100 : 0;
            
            const vendorHtml = `
                <div class="vendor-container">
                    <div class="vendor-item">
                        <div class="vendor-header">
                            <img src="imagens/nokia.png" alt="Nokia" class="vendor-logo">
                            <span class="stat-number vendor-pct">${Math.round(nokiaPct)}%</span>
                        </div>
                        <div class="vendor-progress-bg">
                            <div class="vendor-progress-fill success-fill" style="width: ${nokiaPct}%;"></div>
                        </div>
                    </div>
                    <div class="vendor-item">
                        <div class="vendor-header">
                            <img src="imagens/furukawa.png" alt="Furukawa" class="vendor-logo">
                            <span class="stat-number vendor-pct">${Math.round(furukawaPct)}%</span>
                        </div>
                        <div class="vendor-progress-bg">
                            <div class="vendor-progress-fill success-fill" style="width: ${furukawaPct}%;"></div>
                        </div>
                    </div>
                </div>
            `;

            let rankingHtmlContent = '';
            if (top3Olts.some(olt => olt.offline > 0)) {
                top3Olts.forEach((olt, index) => {
                    if (olt.offline === 0) return;
                    const offlinePct = olt.total > 0 ? (olt.offline / olt.total) * 100 : 0;
                    rankingHtmlContent += `
                        <div class="ranking-item">
                            <div class="ranking-header">
                                <strong class="ranking-title">${index + 1}º ${olt.id}</strong>
                                <span class="stat-number ranking-val">${olt.offline} OFF</span>
                            </div>
                            <div class="ranking-progress-bg">
                                <div class="ranking-progress-fill error-fill" style="width: ${offlinePct}%;"></div>
                            </div>
                        </div>
                    `;
                });
            } else {
                rankingHtmlContent = `<div class="ranking-perfect"><span class="material-symbols-rounded icon-perfect">sentiment_very_satisfied</span><br>Rede 100% Online!</div>`;
            }

            // Injeção limpa e estruturada
            card.querySelector('.card-body').innerHTML = `
                <div class="overview-body-grid">
                    <div class="overview-left-col">${statsHtml}</div>
                    <div class="overview-middle-col">${vendorHtml}</div>
                    <div class="overview-right-col">${rankingHtmlContent}</div>
                </div>
            `;
        }

        async function runOverview() {
            createCardPlaceholders();
            
            const energyUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/ENERGIA!A:BP?key=${API_KEY}`;
            const oltPromises = oltsConfig.map(olt => fetchOltData(olt));
            const energyPromise = fetch(energyUrl).then(res => res.json()).catch(() => null);
            
            const allResults = await Promise.all([...oltPromises, energyPromise]);
            const energyDataJson = allResults.pop(); 
            const results = allResults; 
            
            let globalOnline = 0, globalOffline = 0;
            let nokiaOnline = 0, nokiaTotal = 0, furukawaOnline = 0, furukawaTotal = 0;
            let oltStatsList = [], activeBackboneDetails = [], currentBackbones = new Set();
            let allProblems = new Set(), energyProblems = new Set(), portsWithEnergy = new Set(), energyGroups = {};

            if (energyDataJson && energyDataJson.values) {
                const energyRows = energyDataJson.values.slice(1);
                for (const [oltId, colIndex] of Object.entries(ENERGY_MAP)) {
                    energyRows.forEach(row => {
                        if (row.length > colIndex + 2) {
                            const portaFull = row[colIndex + 1], powerOffQtd = parseInt(row[colIndex + 2]) || 0;
                            if (portaFull && powerOffQtd > 0) {
                                const oltResult = results.find(r => r.id === oltId);
                                if (oltResult && oltResult.portData[portaFull]) {
                                    const perc = powerOffQtd / oltResult.portData[portaFull].total;
                                    let severity = (perc >= 0.5 && powerOffQtd >= 10) || (perc === 1 && oltResult.portData[portaFull].total >= 5) ? 'CRIT' : (perc >= 0.2 && powerOffQtd >= 5 ? 'WARN' : null);
                                    if (severity) {
                                        portsWithEnergy.add(`[${oltId} PORTA ${portaFull}]`);
                                        if (!energyGroups[oltId]) energyGroups[oltId] = { crit: 0, warn: 0, clientsOff: 0, portsCount: 0 };
                                        energyGroups[oltId].clientsOff += powerOffQtd;
                                        energyGroups[oltId].portsCount++;
                                        if (severity === 'CRIT') energyGroups[oltId].crit++; else energyGroups[oltId].warn++;
                                    }
                                }
                            }
                        }
                    });
                }
                for (const olt in energyGroups) {
                    energyProblems.add(`[${olt}] ENERGIA::${energyGroups[olt].crit > 0 ? 'CRIT' : 'WARN'}::${energyGroups[olt].clientsOff}::${energyGroups[olt].portsCount}`);
                }
            }

            results.forEach(result => {
                globalOnline += result.onlineCount; globalOffline += result.offlineCount;
                let total = result.onlineCount + result.offlineCount;
                if (result.type === 'nokia') { nokiaOnline += result.onlineCount; nokiaTotal += total; }
                else { furukawaOnline += result.onlineCount; furukawaTotal += total; }
                oltStatsList.push({ id: result.id, offline: result.offlineCount, total });

                let isMicroSuper = false, isCritical = false, isWarning = false, ports100Down = 0;
                for (const key in result.portData) {
                    if (portsWithEnergy.has(`[${result.id} PORTA ${key}]`)) continue;
                    const { off, total: pTotal } = result.portData[key];
                    if (pTotal >= 5) {
                        if (off / pTotal === 1) { ports100Down++; isMicroSuper = true; }
                        else if (off / pTotal >= 0.5) isMicroSuper = true;
                        else if (off >= 32) isCritical = true;
                        else if (off >= 16) isWarning = true;
                    }
                }
                if (ports100Down >= 2) { activeBackboneDetails.push(`OLT: ${result.id}`); currentBackbones.add(result.id); }
                else if (isMicroSuper) allProblems.add(`[${result.id}] STATUS::SUPER`);
                else if (isCritical) allProblems.add(`[${result.id}] STATUS::CRIT`);
                else if (isWarning) allProblems.add(`[${result.id}] STATUS::WARN`);
            });

            oltStatsList.sort((a, b) => b.offline - a.offline);
            updateGlobalCardUI(globalOnline, globalOffline, nokiaOnline, nokiaTotal, furukawaOnline, furukawaTotal, oltStatsList.slice(0, 3));

            const backboneContainer = document.getElementById('backbone-alert-container');
            if (activeBackboneDetails.length > 0) {
                backboneContainer.innerHTML = `<div class="backbone-alert"><span class="material-symbols-rounded">sos</span><div class="backbone-text-container"><p class="backbone-title">Rompimento de Backbone?!</p><p class="backbone-details">${activeBackboneDetails.join('<br>')}</p></div></div>`;
                backboneContainer.style.display = 'block';
            } else backboneContainer.style.display = 'none';

            if (typeof checkAndNotifyForNewProblems === 'function') checkAndNotifyForNewProblems(allProblems, currentBackbones, energyProblems);
            
            const timestampEl = document.getElementById('update-timestamp');
            if(timestampEl) {
                const now = new Date();
                timestampEl.innerHTML = `<span class="material-symbols-rounded">calendar_today</span> ${now.toLocaleDateString('pt-BR')} <span style="width: 1px; height: 12px; background: rgba(255,255,255,0.3); margin: 0 5px;"></span> <span class="material-symbols-rounded">schedule</span> ${now.toLocaleTimeString('pt-BR')}`;
                timestampEl.classList.remove('updated-anim'); void timestampEl.offsetWidth; timestampEl.classList.add('updated-anim');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadHeader({ title: "Dashboard Gerencial", exactTitle: true });
            loadFooter();
            runOverview();
            setInterval(runOverview, REFRESH_INTERVAL_SECONDS * 1000);
            
            // Ligar Motores Adicionais (Energia e Potência) na Home!
            if (typeof startEnergyMonitoring === 'function') {
                startEnergyMonitoring();
                setInterval(startEnergyMonitoring, REFRESH_INTERVAL_SECONDS * 1000);
            }
            if (typeof runPotenciaEngine === 'function') {
                runPotenciaEngine();
                setInterval(runPotenciaEngine, REFRESH_INTERVAL_SECONDS * 1000);
            }
        });
    </script>
</body>
</html>
