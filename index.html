<div class="global-card" id="card-global">
                        <div class="card-header">
                            <h3><span class="material-symbols-rounded">public</span> MONITORAMENTO DA REDE</h3>
                        </div>
                        <div class="card-body" id="card-global-body">
                            
                            <div id="global-net-loading" style="text-align: center; color: var(--m3-on-surface-variant); width: 100%; padding: 20px;">
                                <div class="spinner"></div>
                                <p style="margin-top: 10px; font-size: 0.9rem;">Processando topologia de rede...</p>
                            </div>

                            <div id="global-net-content" style="display: none; width: 100%; justify-content: space-between; align-items: stretch; flex-wrap: wrap; gap: 10px; height: 100%;">
                                
                                <div class="card-stats" style="flex: 1; padding-right: 15px; min-width: 200px;">
                                    <div style="display:flex; align-items:center; gap:8px; margin-bottom:15px">
                                        <span class="material-symbols-rounded" style="color:#60a5fa; font-size:20px;">visibility</span>
                                        <h3 style="margin:0; font-size:1rem; color:var(--m3-on-surface);">Visão Geral</h3>
                                    </div>
                                    <div class="global-stat stat-item">
                                        <span class="stat-number" id="net-total-geral">--</span>
                                        <label><span class="material-symbols-rounded icon-total" style="font-size: 18px;">router</span> Total Geral</label>
                                    </div>
                                    <div class="global-stat stat-item online">
                                        <span class="stat-number" id="net-total-online">--</span>
                                        <label><span class="material-symbols-rounded icon-up" style="font-size: 18px;">check_circle</span> Total Online</label>
                                    </div>
                                    <div class="global-stat stat-item offline">
                                        <span class="stat-number" id="net-total-offline">--</span>
                                        <label><span class="material-symbols-rounded icon-down" style="font-size: 18px;">error</span> Total Offline</label>
                                    </div>
                                </div>
                                
                                <div style="flex: 1; border-left: 1px solid var(--m3-outline); padding-left: 20px; min-width: 200px;">
                                    <div style="display:flex; align-items:center; gap:8px; margin-bottom:15px">
                                        <span class="material-symbols-rounded" style="color:#f87171; font-size:20px;">warning</span>
                                        <h3 style="margin:0; font-size:1rem; color:var(--m3-on-surface);">Top 3 OLTs Críticas</h3>
                                    </div>
                                    <div id="net-ranking-container" style="flex: 1; width: 100%; display: flex; flex-direction: column; justify-content: center;">
                                        
                                        <div id="net-top-1" class="ranking-row" style="display: none; margin-bottom: 10px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background-color 0.2s ease; margin-left: -8px;"
                                             onmouseenter="handleNetHover(event)"
                                             onmouseleave="handleNetLeave()"
                                             onclick="handleNetClick(event)"
                                             onmouseover="this.style.backgroundColor='rgba(255,255,255,0.05)'"
                                             onmouseout="this.style.backgroundColor='transparent'">
                                            <div style="display: flex; justify-content: space-between; margin-bottom: 4px; align-items: baseline; pointer-events: none;">
                                                <strong id="net-top-1-name" style="color: var(--m3-on-surface); font-size: 1rem;"></strong>
                                                <span id="net-top-1-off" class="stat-number" style="font-size: 1rem; color: var(--m3-color-error); width: auto;"></span>
                                            </div>
                                            <div style="height: 8px; background: var(--m3-surface-container-high); border-radius: 4px; overflow: hidden; width: 100%; pointer-events: none;">
                                                <div id="net-top-1-bar" style="height: 100%; width: 0%; background: var(--m3-color-error); border-radius: 4px; transition: width 0.5s ease;"></div>
                                            </div>
                                        </div>
                                        
                                        <div id="net-top-2" class="ranking-row" style="display: none; margin-bottom: 10px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background-color 0.2s ease; margin-left: -8px;"
                                             onmouseenter="handleNetHover(event)"
                                             onmouseleave="handleNetLeave()"
                                             onclick="handleNetClick(event)"
                                             onmouseover="this.style.backgroundColor='rgba(255,255,255,0.05)'"
                                             onmouseout="this.style.backgroundColor='transparent'">
                                            <div style="display: flex; justify-content: space-between; margin-bottom: 4px; align-items: baseline; pointer-events: none;">
                                                <strong id="net-top-2-name" style="color: var(--m3-on-surface); font-size: 1rem;"></strong>
                                                <span id="net-top-2-off" class="stat-number" style="font-size: 1rem; color: var(--m3-color-error); width: auto;"></span>
                                            </div>
                                            <div style="height: 8px; background: var(--m3-surface-container-high); border-radius: 4px; overflow: hidden; width: 100%; pointer-events: none;">
                                                <div id="net-top-2-bar" style="height: 100%; width: 0%; background: var(--m3-color-error); border-radius: 4px; transition: width 0.5s ease;"></div>
                                            </div>
                                        </div>
                                        
                                        <div id="net-top-3" class="ranking-row" style="display: none; margin-bottom: 10px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background-color 0.2s ease; margin-left: -8px;"
                                             onmouseenter="handleNetHover(event)"
                                             onmouseleave="handleNetLeave()"
                                             onclick="handleNetClick(event)"
                                             onmouseover="this.style.backgroundColor='rgba(255,255,255,0.05)'"
                                             onmouseout="this.style.backgroundColor='transparent'">
                                            <div style="display: flex; justify-content: space-between; margin-bottom: 4px; align-items: baseline; pointer-events: none;">
                                                <strong id="net-top-3-name" style="color: var(--m3-on-surface); font-size: 1rem;"></strong>
                                                <span id="net-top-3-off" class="stat-number" style="font-size: 1rem; color: var(--m3-color-error); width: auto;"></span>
                                            </div>
                                            <div style="height: 8px; background: var(--m3-surface-container-high); border-radius: 4px; overflow: hidden; width: 100%; pointer-events: none;">
                                                <div id="net-top-3-bar" style="height: 100%; width: 0%; background: var(--m3-color-error); border-radius: 4px; transition: width 0.5s ease;"></div>
                                            </div>
                                        </div>

                                        <div id="net-no-issues" style="display: none; text-align: center; color: var(--m3-color-success); font-weight: 700; width: 100%;">
                                            <span class="material-symbols-rounded" style="font-size: 40px;">sentiment_very_satisfied</span><br>Rede 100% Online!
                                        </div>
                                        
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
