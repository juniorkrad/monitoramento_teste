<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipamentos - NOC</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="equipamentos.css">
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#67079f">
</head>
<body>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            
            <div id="equipamentos-grid" class="grid-container"></div>

            <div class="table-container" style="margin-top: 30px;">
                <div style="display: flex; align-items: center; gap: 8px; padding: 15px; border-bottom: 1px solid var(--m3-outline);">
                    <span class="material-symbols-rounded" style="color: #f87171;">help_center</span>
                    <h3 style="margin: 0; font-size: 1.1rem; color: var(--m3-on-surface);">Equipamentos Desconhecidos (S/N Não Mapeado)</h3>
                </div>
                <table id="tabela-desconhecidos">
                    <thead>
                        <tr class="table-header-row">
                            <th>OLT</th>
                            <th>Placa/Porta</th>
                            <th>Serial Completo</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="config.js"></script>
    <script src="api-service.js"></script>
    <script src="layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="equipamentos-engine.js"></script>

    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--m3-outline); border-radius: 4px; }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registrado com sucesso!'))
                .catch(err => console.error('Erro ao registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
