<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipamentos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="equipamentos.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            <div id="fabricantes-grid" class="grid-container">
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                    <span class="material-symbols-rounded rotate-anim" style="font-size: 40px; color: var(--m3-on-surface-variant);">sync</span>
                    <p style="color: var(--m3-on-surface-variant);">Processando relatórios de fabricantes...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-desconhecidos" class="modal-overlay" onclick="closeUnknownModal(event)">
        <div class="modal-content modal-large">
            <div class="modal-header" style="background: rgba(248, 113, 113, 0.05); border-bottom: 1px solid rgba(248, 113, 113, 0.2);">
                <h3 style="color: #f87171;"><span class="material-symbols-rounded">warning</span> Seriais Desconhecidos</h3>
                <button class="close-modal" onclick="closeUnknownModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="color: var(--m3-on-surface-variant); margin-bottom: 20px; line-height: 1.5;">
                    Estes são os equipamentos cujos seriais não correspondem aos fabricantes homologados. Identifique a OLT e a Porta para localizá-los nas planilhas.
                </p>
                <div class="table-container">
                    <table id="tabela-desconhecidos">
                        <thead>
                            <tr class="table-header-row">
                                <th>OLT</th>
                                <th>Placa/Porta</th>
                                <th>Serial Completo</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="config.js"></script>
    <script src="api-service.js"></script>
    <script src="layout.js"></script>
    <script src="equipamentos-engine.js"></script>

    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--m3-outline); border-radius: 4px; }
    </style>
</body>
</html>
