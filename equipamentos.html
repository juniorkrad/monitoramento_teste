<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipamentos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">    
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="equipamentos.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

    <div class="page-container">
        <div id="header-placeholder"></div>

        <main class="main-content" style="flex-direction: column;">
            <div id="fabricantes-grid" class="grid-container" style="grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));">
                <p style="padding: 20px;">Carregando dados reais da rede e agrupando seriais...</p>
            </div>
        </main>
    </div>

    <div id="modal-desconhecidos" class="modal-overlay">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3><span class="material-symbols-rounded">troubleshoot</span> Equipamentos Desconhecidos</h3>
                <button class="close-modal" onclick="closeUnknownModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-top: 0; color: var(--m3-on-surface-variant); font-size: 0.9rem;">
                    Lista de equipamentos cujos seriais não correspondem aos fabricantes homologados. Identifique a OLT e a Porta para localizá-los nas planilhas.
                </p>
                <div class="client-table-container">
                    <table id="tabela-desconhecidos">
                        <thead>
                            <tr class="table-header-row">
                                <th>OLT</th>
                                <th>Placa/Porta</th>
                                <th>Serial Completo</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="layout.js"></script>
    <script src="equipamentos-engine.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof loadHeader === 'function') loadHeader({ title: "Equipamentos", exactTitle: true });
            if (typeof loadFooter === 'function') loadFooter();
        });
    </script>

    <style>
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--m3-outline); border-radius: 4px; }
    </style>
</body>
</html>
